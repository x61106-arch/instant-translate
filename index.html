<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>即時翻譯</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎙️</text></svg>">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --card2: #263449;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --accent: #38bdf8;
    --accent2: #818cf8;
    --danger: #f87171;
    --radius: 18px;
  }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: linear-gradient(160deg, #0f172a 0%, #1e1b4b 100%);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
  }
  .app { width: 100%; max-width: 760px; display: flex; flex-direction: column; gap: 14px; flex: 1; }

  header { display: flex; align-items: center; justify-content: space-between; padding: 4px 2px; }
  header h1 { font-size: 1.15rem; font-weight: 700; letter-spacing: .5px; }
  header h1 span { color: var(--accent); }
  .tts-toggle {
    display: flex; align-items: center; gap: 6px;
    font-size: .8rem; color: var(--muted); cursor: pointer; user-select: none;
    background: var(--card); border-radius: 999px; padding: 7px 14px; border: 1px solid #334155;
  }
  .tts-toggle.on { color: var(--accent); border-color: var(--accent); }

  .lang-bar {
    display: grid; grid-template-columns: 1fr 46px 1fr; gap: 8px; align-items: center;
  }
  .lang-bar select {
    width: 100%; padding: 13px 12px; border-radius: var(--radius);
    background: var(--card); color: var(--text); border: 1px solid #334155;
    font-size: 1rem; appearance: none; text-align: center; text-align-last: center; cursor: pointer;
  }
  .swap-btn {
    height: 46px; border-radius: 50%; border: 1px solid #334155; background: var(--card);
    color: var(--accent); font-size: 1.2rem; cursor: pointer; transition: transform .3s;
  }
  .swap-btn:active { transform: rotate(180deg); }

  .panels { display: flex; flex-direction: column; gap: 10px; flex: 1; }
  @media (min-width: 640px) { .panels { flex-direction: row; } .panel { min-height: 220px; } }
  .panel {
    flex: 1; background: var(--card); border-radius: var(--radius); padding: 16px;
    border: 1px solid #334155; display: flex; flex-direction: column; min-height: 130px;
  }
  .panel .label { font-size: .75rem; color: var(--muted); margin-bottom: 8px; letter-spacing: 1px; }
  .panel .content { font-size: 1.3rem; line-height: 1.55; flex: 1; overflow-y: auto; word-break: break-word; }
  .panel.target { background: linear-gradient(145deg, #1e293b, #232045); border-color: #4c4680; }
  .panel.target .content { color: #c7d2fe; font-size: 1.5rem; font-weight: 500; }
  .content .interim { color: var(--muted); }
  .placeholder { color: #475569; }

  .mic-row { display: flex; align-items: center; justify-content: center; gap: 22px; padding: 6px 0 2px; }
  .mic-btn {
    width: 84px; height: 84px; border-radius: 50%; border: none; cursor: pointer;
    background: linear-gradient(145deg, var(--accent), var(--accent2));
    color: #fff; font-size: 2rem; box-shadow: 0 6px 24px rgba(56,189,248,.35);
    transition: all .25s; position: relative;
  }
  .mic-btn.listening {
    background: linear-gradient(145deg, #f87171, #ef4444);
    box-shadow: 0 6px 24px rgba(248,113,113,.4);
    animation: pulse 1.4s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(248,113,113,.5); }
    70% { box-shadow: 0 0 0 22px rgba(248,113,113,0); }
    100% { box-shadow: 0 0 0 0 rgba(248,113,113,0); }
  }
  .side-btn {
    width: 52px; height: 52px; border-radius: 50%; border: 1px solid #334155;
    background: var(--card); color: var(--muted); font-size: 1.15rem; cursor: pointer;
  }
  .status { text-align: center; font-size: .85rem; color: var(--muted); min-height: 1.3em; }

  .type-row { display: flex; gap: 8px; }
  .type-row input {
    flex: 1; padding: 13px 16px; border-radius: var(--radius); border: 1px solid #334155;
    background: var(--card); color: var(--text); font-size: 1rem; outline: none;
  }
  .type-row input:focus { border-color: var(--accent); }
  .type-row button {
    padding: 0 20px; border-radius: var(--radius); border: none;
    background: var(--accent); color: #0f172a; font-weight: 700; font-size: .95rem; cursor: pointer;
  }

  .history { display: flex; flex-direction: column; gap: 8px; padding-bottom: 24px; }
  .history-head { display: flex; justify-content: space-between; align-items: center; margin-top: 4px; }
  .history-head h2 { font-size: .85rem; color: var(--muted); font-weight: 600; letter-spacing: 1px; }
  .history-head button { background: none; border: none; color: #64748b; font-size: .8rem; cursor: pointer; }
  .h-item {
    background: var(--card); border: 1px solid #2c3a52; border-radius: 14px; padding: 12px 14px;
    display: flex; gap: 10px; align-items: flex-start;
  }
  .h-item .texts { flex: 1; }
  .h-item .src { font-size: .85rem; color: var(--muted); margin-bottom: 3px; }
  .h-item .dst { font-size: 1.05rem; color: #c7d2fe; }
  .h-item .speak { background: none; border: none; font-size: 1.1rem; cursor: pointer; padding: 2px; }

  .warn {
    background: #451a1a; border: 1px solid #7f1d1d; color: #fecaca;
    border-radius: 14px; padding: 12px 16px; font-size: .9rem; display: none; line-height: 1.6;
  }

  .mode-tabs {
    display: flex; background: var(--card); border: 1px solid #334155;
    border-radius: 999px; padding: 4px; gap: 4px;
  }
  .mode-tabs button {
    flex: 1; padding: 10px 0; border: none; border-radius: 999px; background: none;
    color: var(--muted); font-size: .92rem; font-weight: 600; cursor: pointer; transition: all .2s;
  }
  .mode-tabs button.active {
    background: linear-gradient(145deg, var(--accent), var(--accent2)); color: #fff;
  }

  .talk-area { display: flex; flex-direction: column; gap: 10px; flex: 1; }
  .talk-head { display: flex; justify-content: space-between; align-items: center; }
  .talk-head h2 { font-size: .85rem; color: var(--muted); font-weight: 600; letter-spacing: 1px; }
  .talk-head button { background: none; border: none; color: #64748b; font-size: .8rem; cursor: pointer; }
  .bubbles {
    flex: 1; display: flex; flex-direction: column; gap: 10px; overflow-y: auto;
    min-height: 220px; max-height: 55dvh; padding: 4px 2px;
  }
  .bubble { max-width: 84%; padding: 11px 15px; border-radius: 16px; }
  .bubble .orig { font-size: .8rem; opacity: .65; margin-bottom: 3px; }
  .bubble .trans { font-size: 1.18rem; font-weight: 500; line-height: 1.45; }
  .bubble.a { align-self: flex-start; background: #1d3a5f; border-bottom-left-radius: 4px; }
  .bubble.b { align-self: flex-end; background: #3b3470; border-bottom-right-radius: 4px; }
  .bubble .speak { background: none; border: none; font-size: 1rem; cursor: pointer; padding: 0 2px; }
  .talk-interim { text-align: center; color: var(--muted); min-height: 1.5em; font-size: 1rem; }
  .meeting-btn {
    padding: 20px; border-radius: var(--radius); border: none; color: #fff;
    font-size: 1.1rem; font-weight: 700; cursor: pointer; margin-bottom: 20px;
    background: linear-gradient(145deg, #2563eb, #38bdf8);
    box-shadow: 0 4px 16px rgba(56,189,248,.25); transition: all .2s;
  }
  .meeting-btn.listening {
    background: linear-gradient(145deg, #ef4444, #f87171);
    animation: pulse 1.4s infinite;
  }
  .talk-head .btns { display: flex; gap: 14px; }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>🎙️ 即時<span>翻譯</span></h1>
    <div class="tts-toggle on" id="ttsToggle">🔊 朗讀翻譯</div>
  </header>

  <div class="warn" id="warn"></div>

  <div class="mode-tabs">
    <button id="modeSingle" class="active">🎯 單向翻譯</button>
    <button id="modeTalk">💬 雙向對話</button>
  </div>

  <div class="lang-bar">
    <select id="srcLang"></select>
    <button class="swap-btn" id="swapBtn" title="交換語言">⇄</button>
    <select id="dstLang"></select>
  </div>

  <div class="panels">
    <div class="panel">
      <div class="label" id="srcLabel">你說的話</div>
      <div class="content" id="srcText"><span class="placeholder">按下麥克風開始說話…</span></div>
    </div>
    <div class="panel target">
      <div class="label" id="dstLabel">翻譯結果</div>
      <div class="content" id="dstText"><span class="placeholder">翻譯會即時出現在這裡</span></div>
    </div>
  </div>

  <div class="talk-area" id="talkArea" style="display:none">
    <div class="talk-head">
      <h2 id="talkPair"></h2>
      <div class="btns">
        <button id="talkCopy">複製全部</button>
        <button id="talkClear">清除</button>
      </div>
    </div>
    <div class="bubbles" id="bubbles"></div>
    <div class="talk-interim" id="talkInterim"></div>
    <button class="meeting-btn" id="meetingBtn">▶ 開始對話</button>
  </div>

  <div class="mic-row">
    <button class="side-btn" id="copyBtn" title="複製翻譯">📋</button>
    <button class="mic-btn" id="micBtn" title="開始 / 停止">🎤</button>
    <button class="side-btn" id="speakBtn" title="再念一次">🔊</button>
  </div>
  <div class="status" id="status">按下麥克風，開始即時翻譯</div>

  <div class="type-row">
    <input type="text" id="typeInput" placeholder="也可以直接打字翻譯…" autocomplete="off">
    <button id="typeBtn">翻譯</button>
  </div>

  <div class="history">
    <div class="history-head">
      <h2>對話記錄</h2>
      <button id="clearBtn">清除</button>
    </div>
    <div id="historyList"></div>
  </div>
</div>

<script>
const LANGS = [
  { code: 'zh-TW', speech: 'zh-TW', label: '中文（繁體）' },
  { code: 'zh-CN', speech: 'zh-CN', label: '中文（简体）' },
  { code: 'en',    speech: 'en-US', label: 'English 英文' },
  { code: 'ja',    speech: 'ja-JP', label: '日本語 日文' },
  { code: 'ko',    speech: 'ko-KR', label: '한국어 韓文' },
  { code: 'th',    speech: 'th-TH', label: 'ไทย 泰文' },
  { code: 'vi',    speech: 'vi-VN', label: 'Tiếng Việt 越南文' },
  { code: 'id',    speech: 'id-ID', label: 'Bahasa 印尼文' },
  { code: 'es',    speech: 'es-ES', label: 'Español 西班牙文' },
  { code: 'fr',    speech: 'fr-FR', label: 'Français 法文' },
  { code: 'de',    speech: 'de-DE', label: 'Deutsch 德文' },
  { code: 'it',    speech: 'it-IT', label: 'Italiano 義大利文' },
  { code: 'pt',    speech: 'pt-BR', label: 'Português 葡萄牙文' },
  { code: 'ru',    speech: 'ru-RU', label: 'Русский 俄文' },
];

const $ = id => document.getElementById(id);
const srcSel = $('srcLang'), dstSel = $('dstLang');

LANGS.forEach(l => {
  srcSel.add(new Option(l.label, l.code));
  dstSel.add(new Option(l.label, l.code));
});
srcSel.value = localStorage.getItem('srcLang') || 'zh-TW';
dstSel.value = localStorage.getItem('dstLang') || 'en';

const langOf = code => LANGS.find(l => l.code === code);

let listening = false;
let recognition = null;
let finalBuffer = '';
let interimTimer = null;
let ttsOn = true;
let lastTranslation = '';
let history = [];

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (!SR) {
  $('warn').style.display = 'block';
  $('warn').textContent = '⚠️ 這個瀏覽器不支援語音辨識，麥克風功能無法使用。請改用 Chrome、Edge 或 iPhone 的 Safari。下方「打字翻譯」仍然可以正常使用。';
  $('micBtn').style.opacity = .4;
}

async function translateText(text, sl, tl) {
  const url = 'https://translate.googleapis.com/translate_a/single?client=gtx&sl=' +
    encodeURIComponent(sl) + '&tl=' + encodeURIComponent(tl) + '&dt=t&q=' + encodeURIComponent(text);
  const res = await fetch(url);
  if (!res.ok) throw new Error('translate failed');
  const data = await res.json();
  return (data[0] || []).map(seg => seg[0]).join('');
}

function setSrcText(finalText, interimText) {
  const el = $('srcText');
  if (!finalText && !interimText) {
    el.innerHTML = '<span class="placeholder">按下麥克風開始說話…</span>';
    return;
  }
  el.textContent = '';
  if (finalText) el.append(document.createTextNode(finalText));
  if (interimText) {
    const s = document.createElement('span');
    s.className = 'interim';
    s.textContent = (finalText ? ' ' : '') + interimText;
    el.append(s);
  }
  el.scrollTop = el.scrollHeight;
}

function setDstText(text, isInterim) {
  const el = $('dstText');
  if (!text) {
    el.innerHTML = '<span class="placeholder">翻譯會即時出現在這裡</span>';
    return;
  }
  el.textContent = text;
  el.style.opacity = isInterim ? .65 : 1;
  el.scrollTop = el.scrollHeight;
}

function speak(text, langCode) {
  if (!('speechSynthesis' in window) || !text) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = langOf(langCode).speech;
  const voice = speechSynthesis.getVoices().find(v => v.lang.replace('_','-').startsWith(langOf(langCode).speech.split('-')[0]));
  if (voice) u.voice = voice;
  u.rate = 1;
  speechSynthesis.speak(u);
}
if ('speechSynthesis' in window) speechSynthesis.getVoices();

function addHistory(src, dst) {
  history.unshift({ src, dst });
  renderHistory();
}
function renderHistory() {
  const list = $('historyList');
  list.textContent = '';
  history.forEach(item => {
    const div = document.createElement('div');
    div.className = 'h-item';
    const texts = document.createElement('div');
    texts.className = 'texts';
    const s = document.createElement('div'); s.className = 'src'; s.textContent = item.src;
    const d = document.createElement('div'); d.className = 'dst'; d.textContent = item.dst;
    texts.append(s, d);
    const btn = document.createElement('button');
    btn.className = 'speak'; btn.textContent = '🔊';
    btn.onclick = () => speak(item.dst, dstSel.value);
    div.append(texts, btn);
    list.append(div);
  });
}

async function handleFinal(text) {
  if (!text.trim()) return;
  try {
    const out = await translateText(text, srcSel.value, dstSel.value);
    lastTranslation = out;
    setDstText(out, false);
    addHistory(text, out);
    if (ttsOn) speak(out, dstSel.value);
  } catch (e) {
    $('status').textContent = '⚠️ 翻譯失敗，請檢查網路';
  }
}

function scheduleInterimTranslate(text) {
  clearTimeout(interimTimer);
  interimTimer = setTimeout(async () => {
    try {
      const out = await translateText(text, srcSel.value, dstSel.value);
      if (listening) setDstText(out, true);
    } catch (e) { /* interim errors are silent */ }
  }, 450);
}

function buildRecognition() {
  const r = new SR();
  r.lang = langOf(srcSel.value).speech;
  r.continuous = true;
  r.interimResults = true;
  r.onresult = ev => {
    let interim = '';
    for (let i = ev.resultIndex; i < ev.results.length; i++) {
      const t = ev.results[i][0].transcript;
      if (ev.results[i].isFinal) {
        finalBuffer = t.trim();
        setSrcText(finalBuffer, '');
        handleFinal(finalBuffer);
      } else {
        interim += t;
      }
    }
    if (interim) {
      setSrcText('', interim.trim());
      scheduleInterimTranslate(interim.trim());
    }
  };
  r.onerror = ev => {
    if (ev.error === 'not-allowed' || ev.error === 'service-not-allowed') {
      stopListening();
      $('status').textContent = '⚠️ 請允許使用麥克風（點網址列旁的鎖頭圖示）';
    } else if (ev.error === 'no-speech') {
      $('status').textContent = '沒聽到聲音，繼續聆聽中…';
    } else if (ev.error !== 'aborted') {
      $('status').textContent = '⚠️ 語音辨識出錯：' + ev.error;
    }
  };
  r.onend = () => {
    if (listening) {
      try { r.start(); } catch (e) { /* already started */ }
    }
  };
  return r;
}

function startListening() {
  if (!SR) return;
  listening = true;
  finalBuffer = '';
  recognition = buildRecognition();
  try { recognition.start(); } catch (e) {}
  $('micBtn').classList.add('listening');
  $('micBtn').textContent = '⏹';
  $('status').textContent = '🔴 聆聽中… 說完會自動翻譯';
}

function stopListening() {
  listening = false;
  if (recognition) { recognition.onend = null; try { recognition.stop(); } catch (e) {} }
  $('micBtn').classList.remove('listening');
  $('micBtn').textContent = '🎤';
  $('status').textContent = '已停止，按麥克風繼續';
}

$('micBtn').onclick = () => listening ? stopListening() : startListening();

$('swapBtn').onclick = () => {
  const a = srcSel.value;
  srcSel.value = dstSel.value;
  dstSel.value = a;
  onLangChange();
};

function onLangChange() {
  localStorage.setItem('srcLang', srcSel.value);
  localStorage.setItem('dstLang', dstSel.value);
  if (listening) { stopListening(); startListening(); }
  updateTalkLabels();
}
srcSel.onchange = onLangChange;
dstSel.onchange = onLangChange;

$('ttsToggle').onclick = () => {
  ttsOn = !ttsOn;
  $('ttsToggle').classList.toggle('on', ttsOn);
  $('ttsToggle').textContent = ttsOn ? '🔊 朗讀翻譯' : '🔇 不朗讀';
  if (!ttsOn) speechSynthesis.cancel();
};

$('speakBtn').onclick = () => speak(lastTranslation, dstSel.value);

$('copyBtn').onclick = async () => {
  if (!lastTranslation) return;
  try {
    await navigator.clipboard.writeText(lastTranslation);
    $('status').textContent = '✅ 已複製翻譯結果';
  } catch (e) {
    $('status').textContent = '⚠️ 複製失敗';
  }
};

$('clearBtn').onclick = () => { history = []; renderHistory(); };

async function doTypeTranslate() {
  const text = $('typeInput').value.trim();
  if (!text) return;
  setSrcText(text, '');
  $('status').textContent = '翻譯中…';
  try {
    const out = await translateText(text, srcSel.value, dstSel.value);
    lastTranslation = out;
    setDstText(out, false);
    addHistory(text, out);
    if (ttsOn) speak(out, dstSel.value);
    $('status').textContent = '';
    $('typeInput').value = '';
  } catch (e) {
    $('status').textContent = '⚠️ 翻譯失敗，請檢查網路';
  }
}
$('typeBtn').onclick = doTypeTranslate;
$('typeInput').addEventListener('keydown', e => { if (e.key === 'Enter') doTypeTranslate(); });

/* ---------- 雙向對話模式（會議收音） ---------- */
let mode = localStorage.getItem('mode') || 'single';
let meetingOn = false;
let meetingRec = null;
let speaking = false; // TTS 播放中暫停收音，避免麥克風收到自己的朗讀聲
let talkLog = [];
try { talkLog = JSON.parse(localStorage.getItem('talkLog') || '[]'); } catch (e) {}

const baseLang = c => (c || '').toLowerCase().split('-')[0];

function updateTalkLabels() {
  $('talkPair').textContent = langOf(srcSel.value).label + ' ⇄ ' + langOf(dstSel.value).label;
}

function applyMode() {
  const talk = mode === 'talk';
  $('modeSingle').classList.toggle('active', !talk);
  $('modeTalk').classList.toggle('active', talk);
  document.querySelector('.panels').style.display = talk ? 'none' : '';
  document.querySelector('.mic-row').style.display = talk ? 'none' : '';
  $('status').style.display = talk ? 'none' : '';
  document.querySelector('.type-row').style.display = talk ? 'none' : '';
  document.querySelector('.history').style.display = talk ? 'none' : '';
  $('talkArea').style.display = talk ? '' : 'none';
  if (talk) { if (listening) stopListening(); updateTalkLabels(); }
  else { stopMeeting(); }
  localStorage.setItem('mode', mode);
}

function saveTalkLog() {
  try { localStorage.setItem('talkLog', JSON.stringify(talkLog.slice(-200))); } catch (e) {}
}

function addBubble(side, orig, trans, toLang, save) {
  const div = document.createElement('div');
  div.className = 'bubble ' + (side === 'A' ? 'a' : 'b');
  const o = document.createElement('div'); o.className = 'orig'; o.textContent = orig;
  const t = document.createElement('div'); t.className = 'trans'; t.textContent = trans + ' ';
  const btn = document.createElement('button');
  btn.className = 'speak'; btn.textContent = '🔊';
  btn.onclick = () => speak(trans, toLang);
  t.append(btn);
  div.append(o, t);
  $('bubbles').append(div);
  $('bubbles').scrollTop = $('bubbles').scrollHeight;
  if (save) {
    talkLog.push({ side, orig, trans, toLang });
    saveTalkLog();
  }
}

function renderTalkLog() {
  $('bubbles').textContent = '';
  talkLog.forEach(i => addBubble(i.side, i.orig, i.trans, i.toLang, false));
}

async function translateDetect(text, tl) {
  const url = 'https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=' +
    encodeURIComponent(tl) + '&dt=t&q=' + encodeURIComponent(text);
  const res = await fetch(url);
  if (!res.ok) throw new Error('translate failed');
  const data = await res.json();
  return { out: (data[0] || []).map(seg => seg[0]).join(''), detected: data[2] || '' };
}

// 依字元範圍判斷語言（免費翻譯端點對中文的偵測不可靠，字元判斷優先）
function detectByScript(text) {
  if (/[぀-ヿ]/.test(text)) return 'ja';   // 假名（要在漢字之前判斷）
  if (/[가-힯]/.test(text)) return 'ko';   // 韓文
  if (/[฀-๿]/.test(text)) return 'th';   // 泰文
  if (/[一-鿿]/.test(text)) return 'zh';   // 漢字
  if (/[Ѐ-ӿ]/.test(text)) return 'ru';   // 西里爾字母
  return '';
}

async function processUtterance(text) {
  try {
    // 判斷這句是誰說的：是右邊語言 → 對方（B），翻回左邊；否則當自己（A），翻到右邊
    const guess = detectByScript(text);
    const isDst = g => g && g === baseLang(dstSel.value) && g !== baseLang(srcSel.value);
    let side = 'A', out, toLang = dstSel.value;
    if (guess) {
      if (isDst(guess)) {
        side = 'B'; toLang = srcSel.value;
        out = await translateText(text, dstSel.value, srcSel.value);
      } else {
        out = await translateText(text, srcSel.value, dstSel.value);
      }
    } else {
      const first = await translateDetect(text, dstSel.value);
      if (isDst(baseLang(first.detected))) {
        side = 'B'; toLang = srcSel.value;
        out = await translateText(text, first.detected, srcSel.value);
      } else {
        out = first.out;
      }
    }
    addBubble(side, text, out, toLang, true);
    if (ttsOn) speakMeeting(out, toLang);
  } catch (e) {
    $('talkInterim').textContent = '⚠️ 翻譯失敗，請檢查網路';
  }
}

function speakMeeting(text, langCode) {
  if (!('speechSynthesis' in window) || !text) { return; }
  speaking = true;
  if (meetingRec) { try { meetingRec.stop(); } catch (e) {} }
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = langOf(langCode).speech;
  const voice = speechSynthesis.getVoices().find(v => v.lang.replace('_','-').startsWith(langOf(langCode).speech.split('-')[0]));
  if (voice) u.voice = voice;
  u.onend = u.onerror = () => {
    speaking = false;
    if (meetingOn && meetingRec) { try { meetingRec.start(); } catch (e) {} }
  };
  speechSynthesis.speak(u);
}

function startMeeting() {
  if (!SR) return;
  meetingOn = true;
  const r = new SR();
  meetingRec = r;
  r.lang = langOf(srcSel.value).speech;
  r.continuous = true;
  r.interimResults = true;
  r.onresult = ev => {
    let interim = '';
    for (let i = ev.resultIndex; i < ev.results.length; i++) {
      const t = ev.results[i][0].transcript;
      if (ev.results[i].isFinal) {
        const txt = t.trim();
        if (txt) {
          $('talkInterim').textContent = '';
          processUtterance(txt);
        }
      } else {
        interim += t;
      }
    }
    if (interim.trim()) $('talkInterim').textContent = interim.trim();
  };
  r.onerror = ev => {
    if (ev.error === 'not-allowed' || ev.error === 'service-not-allowed') {
      stopMeeting();
      $('talkInterim').textContent = '⚠️ 請允許使用麥克風（點網址列旁的鎖頭圖示）';
    }
  };
  r.onend = () => {
    if (meetingOn && !speaking) { try { r.start(); } catch (e) {} }
  };
  try { r.start(); } catch (e) {}
  $('meetingBtn').classList.add('listening');
  $('meetingBtn').textContent = '⏹ 結束對話';
  $('talkInterim').textContent = '🔴 收音中，開始交談吧…';
}

function stopMeeting() {
  meetingOn = false;
  if (meetingRec) { meetingRec.onend = null; try { meetingRec.stop(); } catch (e) {} meetingRec = null; }
  $('meetingBtn').classList.remove('listening');
  $('meetingBtn').textContent = '▶ 開始對話';
  if ($('talkInterim').textContent.startsWith('🔴')) $('talkInterim').textContent = '';
}

$('modeSingle').onclick = () => { mode = 'single'; applyMode(); };
$('modeTalk').onclick = () => { mode = 'talk'; applyMode(); };
$('meetingBtn').onclick = () => meetingOn ? stopMeeting() : startMeeting();
$('talkClear').onclick = () => { talkLog = []; saveTalkLog(); $('bubbles').textContent = ''; };
$('talkCopy').onclick = async () => {
  if (!talkLog.length) return;
  const textOut = talkLog.map(i => i.orig + '\n→ ' + i.trans).join('\n\n');
  try {
    await navigator.clipboard.writeText(textOut);
    $('talkInterim').textContent = '✅ 已複製全部對話';
  } catch (e) {
    $('talkInterim').textContent = '⚠️ 複製失敗';
  }
};

renderTalkLog();
updateTalkLabels();
applyMode();
</script>
</body>
</html>
